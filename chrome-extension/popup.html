<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApplyTrack - Save Job</title>
    <style>
        body {
            width: 350px;
            min-height: 400px;
            margin: 0;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f8fafc;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .logo-icon {
            width: 24px;
            height: 24px;
            background-color: #3b82f6;
            border-radius: 4px;
        }
        
        .logo-text {
            font-size: 18px;
            font-weight: 600;
            color: #1f2937;
        }
        
        .subtitle {
            font-size: 12px;
            color: #6b7280;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 4px;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 60px;
        }
        
        .platform-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .platform-linkedin { background-color: #e3f2fd; color: #1976d2; }
        .platform-naukri { background-color: #fff3e0; color: #f57c00; }
        .platform-indeed { background-color: #e8eaf6; color: #3949ab; }
        .platform-other { background-color: #f3f4f6; color: #6b7280; }
        
        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 20px;
        }
        
        .btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background-color: #3b82f6;
            color: white;
        }
        
        .btn-primary:hover {
            background-color: #2563eb;
        }
        
        .btn-secondary {
            background-color: #f3f4f6;
            color: #6b7280;
        }
        
        .btn-secondary:hover {
            background-color: #e5e7eb;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .status {
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            margin-top: 12px;
        }
        
        .status-success {
            background-color: #d1fae5;
            color: #065f46;
        }
        
        .status-error {
            background-color: #fee2e2;
            color: #991b1b;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <div class="logo-icon"></div>
            <div class="logo-text">ApplyTrack</div>
        </div>
        <div class="subtitle">Save this job application</div>
    </div>

    <div id="platform-info">
        <div id="platform-badge" class="platform-badge platform-other"></div>
    </div>

    <form id="job-form">
        <div class="form-group">
            <label for="company">Company *</label>
            <input type="text" id="company" name="company" required>
        </div>

        <div class="form-group">
            <label for="role">Role *</label>
            <input type="text" id="role" name="role" required>
        </div>

        <div class="form-group">
            <label for="platform">Platform *</label>
            <select id="platform" name="platform" required>
                <option value="LINKEDIN">LinkedIn</option>
                <option value="NAUKRI">Naukri</option>
                <option value="INDEED">Indeed</option>
                <option value="OTHER">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label for="jobLink">Job Link</label>
            <input type="url" id="jobLink" name="jobLink" readonly>
        </div>

        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" placeholder="Add any additional notes..."></textarea>
        </div>

        <div class="button-group">
            <button type="button" id="cancel-btn" class="btn btn-secondary">Cancel</button>
            <button type="submit" id="save-btn" class="btn btn-primary">Save Job</button>
        </div>
    </form>

    <div id="status-message" class="status hidden"></div>

    <script src="popup.js"></script>
</body>
</html>
